  gap: 8px;
  padding: 8px 10px;
  border-bottom: 1px solid #21262d;
}
.dap-la-item:hover { background: #1c2128; }
.dap-lai-km   { font-size: 11px; color: #8b949e; min-width: 60px; font-variant-numeric: tabular-nums; }
.dap-lai-info { flex: 1; }
.dap-lai-desc { font-size: 12px; font-weight: 600; color: #e6edf3; }
.dap-lai-date { font-size: 10px; color: #6e7681; margin-top: 1px; }
.dap-lai-speed { font-size: 20px; font-weight: 900; text-align: right; line-height: 1; }
.dap-lai-speed small { display: block; font-size: 9px; font-weight: 400; color: #6e7681; }

/* ESF */
.dap-esf-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 10px;
  background: #1c2128;
  border-bottom: 1px solid #30363d;
  font-size: 12px;
  font-weight: 700;
  color: #e6edf3;
  flex-shrink: 0;
}
.dap-esf-gesamt { font-size: 14px; font-weight: 900; }
.dap-esf-liste  { flex: 1; overflow-y: auto; }
.dap-esf-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 10px;
  border-bottom: 1px solid #21262d;
  border-left: 3px solid transparent;
}
.esf-slow   { border-left-color: #22c55e; }
.esf-save   { border-left-color: #22c55e; }
.esf-normal { border-left-color: #f59e0b; }
.esf-fast   { border-left-color: #f97316; }
.esf-vmax   { border-left-color: #ef4444; }
.esf-past   { opacity: .4; }
.dap-esf-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.dap-esf-content { flex: 1; min-width: 0; }
.dap-esf-route { font-size: 11px; color: #8b949e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.dap-esf-empf  { font-size: 13px; font-weight: 800; color: #e6edf3; margin-bottom: 5px; }
.dap-esf-bar-mini { height: 4px; background: #21262d; border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
.dap-esf-bar-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #ef4444); border-radius: 2px; transition: width .4s; }
.dap-esf-meta { font-size: 10px; color: #6e7681; }
.dap-esf-meta b { color: #f59e0b; }

/* ── RECHTE SPALTE ── */
.dap-right {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #0d1117;
}
.dap-right-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  background: #161b22;
  border-bottom: 2px solid #30363d;
  flex-shrink: 0;
}
.dap-fp-title { font-size: 13px; font-weight: 800; color: #e6edf3; letter-spacing: .3px; }
.dap-fp-legende { display: flex; gap: 14px; }
.dap-leg { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
.dap-leg.soll { background: rgba(88,166,255,.15); color: #58a6ff; }
.dap-leg.ist  { background: rgba(34,197,94,.15); color: #22c55e; }

/* Streckenprofil */
.dap-strecke-wrap { flex: 1; overflow-y: auto; overflow-x: hidden; }
.dap-strecke-wrap::-webkit-scrollbar { width: 4px; }
.dap-strecke-wrap::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

.ds-row {
  display: grid;
  grid-template-columns: 52px 32px 1fr auto;
  align-items: center;
  padding: 0;
  border-bottom: 1px solid #21262d;
  min-height: 44px;
  transition: background .1s;
}
.ds-row:hover  { background: #1c2128; }
.ds-current    { background: rgba(88,166,255,.08) !important; }
.ds-past       { opacity: .45; }

.ds-km {
  font-size: 11px;
  color: #6e7681;
  text-align: right;
  padding: 0 6px 0 0;
  font-variant-numeric: tabular-nums;
  line-height: 1.2;
}
.ds-track {
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100%;
  position: relative;
  padding: 0 4px;
}
.ds-track-line {
  flex: 1;
  width: 3px;
  background: #58a6ff;
  min-height: 10px;
}
.ds-track-first { background: transparent; }
.ds-track-last  { background: transparent; }
.ds-track-dot {
  font-size: 10px;
  color: #58a6ff;
  line-height: 1;
  z-index: 1;
}
.ds-track-diamond { font-size: 14px; color: #58a6ff; filter: drop-shadow(0 0 4px #58a6ff); }

.ds-station {
  padding: 6px 8px;
}
.ds-station-name {
  font-size: 14px;
  font-weight: 700;
  color: #e6edf3;
  line-height: 1.3;
}
.ds-name-current { color: #58a6ff; font-size: 15px; }
.ds-gleis   { font-size: 11px; color: #8b949e; margin-top: 2px; }
.ds-hinweis { font-size: 11px; color: #f59e0b; margin-top: 2px; }

.ds-times {
  display: flex;
  gap: 10px;
  padding: 6px 12px 6px 0;
  font-variant-numeric: tabular-nums;
  align-items: center;
}
.ds-soll, .ds-ist {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.ds-t-label { font-size: 9px; color: #6e7681; text-transform: uppercase; }
.ds-t-val   { font-size: 12px; font-weight: 700; color: #8b949e; }
.ds-ist-val { color: #22c55e; }
.ds-del-ok    { color: #22c55e; font-size: 10px; margin-left: 2px; }
.ds-del-red   { color: #ef4444; font-size: 10px; margin-left: 2px; }
.ds-del-early { color: #22c55e; font-size: 10px; margin-left: 2px; }

/* Statuszeile */
.dap-statusbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 6px 14px;
  background: #161b22;
  border-top: 2px solid #30363d;
  flex-shrink: 0;
  font-size: 13px;
}
.dap-vmax-badge { background: #21262d; color: #e6edf3; padding: 3px 10px; border-radius: 4px; font-weight: 700; }
.dap-gsm-badge  { color: #8b949e; font-size: 11px; }
.dap-versp-big  { font-size: 16px; font-weight: 900; margin-left: auto; }
.dap-statusbar-clock { font-size: 13px; font-weight: 700; color: #e6edf3; font-variant-numeric: tabular-nums; }

/* ── RESPONSIVE ── */

/* ═══════════════════════════════════════════════════════════
   RESPONSIVE SYSTEM – Sauber & Vollständig
   Breakpoints:
   - xs:  < 480px     (Smartphone Portrait)
   - sm:  480–767px   (Smartphone Landscape)
   - md:  768–1023px  (Tablet Portrait)
   - lg:  1024–1279px (Tablet Landscape)
   - xl:  ≥ 1280px    (Desktop)
═══════════════════════════════════════════════════════════ */

/* ── BASE (Mobile First) ──────────────────────────────── */
html, body {
  width: 100%;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
}

/* Viewport-Variablen */
:root {
  --topbar-h:  52px;
  --status-h:  34px;
  --nav-h:     60px;
  --sidebar-w: 0px;
}

/* ── TOPBAR ── */
.topbar { height: var(--topbar-h); }
.topbar-title { font-size: 16px; }
.topbar-logo  { width: 32px; height: 32px; }

/* ── NAVIGATION ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  flex-direction: row;
  background: rgba(18,18,18,.97);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  z-index: 100;
}
.nav-btn {
  flex: 1;
  flex-direction: column;
  padding: 6px 0;
}
.nav-label { display: block; font-size: 9px; }
.nav-icon  { font-size: 20px; }

/* ── SCREEN CONTENT ── */
.screen-content {
  padding-bottom: calc(var(--nav-h) + 4px);
  min-height: calc(100vh - var(--status-h) - var(--topbar-h));
}

/* ── HOME TILES ── xs ── */
.home-grid, .home-grid-dynamic {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px 12px 4px;
}
.home-tile-icon  { font-size: 32px; aspect-ratio: 1.3; }
.home-tile-name  { font-size: 13px; }
.home-tile-sub   { font-size: 10px; }
.home-tile-body  { padding: 8px 10px 12px; }

/* ── OVERLAYS ── */
.overlay-sheet { max-height: 95vh; border-radius: 18px 18px 0 0; }

/* ── ADMIN ── */
.admin-panel { padding: 0; }
.form-card   { padding: 14px; }

/* ── AUTH ── */
.auth-screen { padding: 16px; }
.auth-card   { padding: 20px 16px; border-radius: 14px; }

/* ═══════════════════════════════════════
   SM – Smartphone Landscape (480px+)
═══════════════════════════════════════ */
@media (min-width: 480px) {
  .home-grid, .home-grid-dynamic {
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 10px 14px;
  }
  .home-tile-icon { font-size: 34px; }
  .overlay-sheet  { max-width: 480px; }
}

/* ═══════════════════════════════════════
   SM Landscape – Querformat Handy
═══════════════════════════════════════ */
@media (max-height: 500px) and (orientation: landscape) {
  :root { --topbar-h: 44px; --nav-h: 50px; }
  .home-grid, .home-grid-dynamic {
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    padding: 8px;
  }
  .home-tile-icon { aspect-ratio: 1.2; font-size: 26px; }
  .home-tile-name { font-size: 12px; }
  .home-greeting  { padding: 12px 16px; margin: 10px 10px 4px; }
  .home-greeting-icon { width: 44px; height: 44px; font-size: 26px; }
  .home-greeting-name { font-size: 16px; }
  .nav-label { display: none; }
  .nav-icon  { font-size: 22px; }
}

/* ═══════════════════════════════════════
   MD – Tablet Portrait (768px+)
═══════════════════════════════════════ */
@media (min-width: 768px) {
  :root { --sidebar-w: 0px; }

  body {
    max-width: 680px;
    margin: 0 auto;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
  .bottom-nav {
    left: 50%;
    transform: translateX(-50%);
    width: 680px;
  }

  .home-grid, .home-grid-dynamic {
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 12px 16px;
  }
  .home-tile-icon { font-size: 40px; aspect-ratio: 1.4; }
  .home-tile-name { font-size: 15px; }
  .home-tile-body { padding: 10px 14px 16px; }
  .home-greeting  { padding: 20px 24px; }
  .home-greeting-name { font-size: 22px; }
  .home-greeting-icon { width: 58px; height: 58px; font-size: 34px; }

  .overlay-sheet { max-width: 560px; }
  .admin-tab     { font-size: 13px; padding: 14px 12px; }
}

/* ═══════════════════════════════════════
   LG – Tablet Landscape / Desktop (1024px+)
   → Sidebar Navigation
═══════════════════════════════════════ */
@media (min-width: 1024px) {
  :root { --sidebar-w: 220px; }

  /* Reset body centering for sidebar layout */
  body { max-width: none; border: none; }

  /* Sidebar grid */
  #screen-user {
    display: grid !important;
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-rows: var(--topbar-h) 1fr;
    min-height: 100vh;
  }
  #screen-user > .topbar {
    grid-column: 1 / -1;
    grid-row: 1;
  }

  /* Sidebar navigation */
  .bottom-nav {
    position: sticky;
    top: var(--topbar-h);
    left: 0;
    width: var(--sidebar-w);
    height: calc(100vh - var(--topbar-h));
    flex-direction: column;
    justify-content: flex-start;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    border-top: none;
    padding: 10px 0;
    gap: 0;
    transform: none;
    grid-column: 1;
    grid-row: 2;
    overflow-y: auto;
  }
  .nav-btn {
    flex-direction: row;
    justify-content: flex-start;
    align-items: center;
    padding: 13px 18px;
    gap: 12px;
    border-radius: 0;
    height: auto;
    position: relative;
  }
  .nav-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: transparent;
    transition: background .15s;
  }
  .nav-btn.active::before { background: var(--red); }
  .nav-btn.active { background: rgba(204,0,0,.07); }
  .nav-icon  { font-size: 20px; flex-shrink: 0; padding: 0; }
  .nav-label { display: block !important; font-size: 13px; }
  .nav-badge { position: absolute; right: 14px; }

  /* Main content */
  .screen-content {
    grid-column: 2;
    grid-row: 2;
    height: calc(100vh - var(--topbar-h));
    overflow-y: auto;
    padding-bottom: 0;
  }

  /* Remove bottom nav width reset */
  .bottom-nav { left: unset; transform: none; }

  /* Home 3-spaltig */
  .home-grid, .home-grid-dynamic {
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    padding: 18px 20px;
  }
  .home-greeting { margin: 16px 20px 8px; }

  .overlay-sheet { max-width: 580px; }
  .form-card     { max-width: 640px; }
}

/* ═══════════════════════════════════════
   XL – Wide Desktop (1280px+)
═══════════════════════════════════════ */
@media (min-width: 1280px) {
  :root { --sidebar-w: 240px; }

  .home-grid, .home-grid-dynamic {
    grid-template-columns: repeat(4, 1fr);
  }

  .screen-content { max-width: 1200px; }
}

/* ═══════════════════════════════════════
   DAP – Digitaler Arbeitsplatz Responsive
═══════════════════════════════════════ */

/* xs: Stacked */
#view-arbeitsplatz {
  height: calc(100vh - var(--status-h) - var(--topbar-h) - var(--nav-h));
}
.dap-main {
  display: flex;
  flex-direction: column;
}
.dap-left  { min-height: 240px; border-right: none; border-bottom: 2px solid #30363d; }
.dap-right { flex: 1; min-height: 300px; }

/* sm+: Side by side */
@media (min-width: 640px), (orientation: landscape) and (min-width: 500px) {
  .dap-main {
    flex-direction: row;
  }
  .dap-left  {
    width: 260px;
    min-width: 220px;
    max-width: 300px;
    border-right: 2px solid #30363d;
    border-bottom: none;
    flex-shrink: 0;
  }
  .dap-right { flex: 1; }
}

/* md+: Wider sidebar */
@media (min-width: 900px) {
  .dap-left { width: 320px; max-width: 360px; }
  .dap-right { flex: 1; }

  #view-arbeitsplatz {
    height: calc(100vh - var(--topbar-h));
  }
}

/* lg+: With main sidebar */
@media (min-width: 1024px) {
  #view-arbeitsplatz {
    height: calc(100vh - var(--topbar-h));
  }
  .dap-left { width: 340px; }
}

/* ═══════════════════════════════════════
   ADMIN PANEL Responsive
═══════════════════════════════════════ */
.admin-tabs {
  overflow-x: auto;
  white-space: nowrap;
  -webkit-overflow-scrolling: touch;
}
.admin-tab { min-width: 60px; }

@media (min-width: 768px) {
  .admin-tab { min-width: 80px; font-size: 13px; }
}
@media (min-width: 1024px) {
  #screen-admin {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-rows: auto 1fr;
    min-height: 100vh;
  }
  #screen-admin > .topbar {
    grid-column: 1 / -1;
  }
  .admin-tabs {
    grid-column: 1 / -1;
  }
  .admin-panel-wrap {
    grid-column: 2;
    overflow-y: auto;
  }
}

/* ═══════════════════════════════════════
   BETRIEBSLAGE Responsive
═══════════════════════════════════════ */
.bl-meldung-card { padding: 12px 14px; }

@media (min-width: 768px) {
  .bl-detail-content { max-width: 700px; margin: 0 auto; }
}

/* ═══════════════════════════════════════
   TELEFONBUCH Responsive
═══════════════════════════════════════ */
@media (min-width: 1024px) {
  .contact-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .contact-card { border-right: 1px solid var(--border); }
}

/* ═══════════════════════════════════════
   LA TAGESWERTE Responsive
═══════════════════════════════════════ */
@media (min-width: 768px) {
  .la-grid {
    grid-template-columns: repeat(3, 1fr) !important;
  }
}
@media (min-width: 1024px) {
  .la-grid {
    grid-template-columns: repeat(4, 1fr) !important;
  }
}

/* ═══════════════════════════════════════
   POPUP / DESKTOP HINT
═══════════════════════════════════════ */
.desktop-overlay { display: none; }
@media (min-width: 1280px) and (pointer: fine) {
  .desktop-overlay { display: flex; }
}

/* ═══════════════════════════════════════
   PRINT
═══════════════════════════════════════ */
@media print {
  .topbar, .bottom-nav, .dap-topbar { display: none; }
  .screen-content { height: auto; overflow: visible; }
}


/* ═══════════════════════════════════════════════════════
   FAHRGEMEINSCHAFTEN
═══════════════════════════════════════════════════════ */

#view-fahrgemeinschaft {
  display: flex;
  flex-direction: column;
  height: calc(100vh - var(--status-h) - var(--topbar-h) - var(--nav-h));
  overflow: hidden;
  background: var(--bg);
}

/* Header */
.fg-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: linear-gradient(135deg,#7c3aed,#5b21b6);
  flex-shrink: 0;
}
.fg-back {
  background: rgba(255,255,255,.15);
  border: 1px solid rgba(255,255,255,.3);
  color: #fff;
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.fg-title {
  flex: 1;
  font-size: 17px;
  font-weight: 800;
  color: #fff;
}
.fg-btn-new {
  background: rgba(255,255,255,.2);
  border: 1.5px solid rgba(255,255,255,.5);
  color: #fff;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}

/* Tabs */
.fg-tabs {
  display: flex;
  background: var(--bg2);
  border-bottom: 2px solid var(--border);
  flex-shrink: 0;
}
.fg-tab {
  flex: 1;
  padding: 10px 6px;
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.fg-tab.active { color: #7c3aed; border-bottom-color: #7c3aed; }
.fg-badge {
  background: #ef4444;
  color: #fff;
  font-size: 10px;
  font-weight: 800;
  border-radius: 10px;
  padding: 1px 6px;
  min-width: 18px;
  text-align: center;
}

/* Panels */
.fg-panel { flex: 1; overflow-y: auto; }
.fg-empty { text-align: center; color: var(--muted); padding: 40px 16px; font-size: 14px; }

/* Suchleiste */
.fg-search-bar {
  display: flex;
  gap: 8px;
  padding: 12px;
  flex-wrap: wrap;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.fg-search-input {
  flex: 1;
  min-width: 120px;
  background: var(--bg3);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 8px 12px;
  font-size: 14px;
}
.fg-search-btn {
  background: #7c3aed;
  border: none;
  color: #fff;
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}

/* Fahrgemeinschaft Karte */
.fg-liste { padding: 8px; }
.fg-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color .15s;
}
.fg-card:hover { border-color: #7c3aed; }
.fg-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.fg-card-zug {
  background: #7c3aed;
  color: #fff;
  font-weight: 800;
  font-size: 13px;
  padding: 3px 10px;
  border-radius: 6px;
}
.fg-card-user { font-size: 13px; font-weight: 600; }
.fg-card-datum { font-size: 12px; color: var(--muted); margin-left: auto; }
.fg-card-route {
  font-size: 16px;
  font-weight: 800;
  margin-bottom: 6px;
}
.fg-card-arrow { color: var(--muted); margin: 0 6px; }
.fg-card-meta {
  display: flex;
  gap: 12px;
  font-size: 12px;
  color: var(--muted);
  flex-wrap: wrap;
}
.fg-card-plaetze {
  background: rgba(124,58,237,.1);
  color: #7c3aed;
  border-radius: 6px;
  padding: 2px 8px;
  font-weight: 700;
}
.fg-card-voll { background: rgba(239,68,68,.1); color: #ef4444; }
.fg-card-hinweis { font-size: 12px; color: var(--muted); margin-top: 6px; font-style: italic; }
.fg-card-actions { display: flex; gap: 8px; margin-top: 10px; }
.fg-card-anfragen-btn {
  flex: 1;
  background: #7c3aed;
  border: none;
  color: #fff;
  border-radius: 8px;
  padding: 8px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}
.fg-card-delete-btn {
  background: rgba(239,68,68,.1);
  border: 1px solid rgba(239,68,68,.3);
  color: #ef4444;
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 13px;
  cursor: pointer;
}

/* Anfragen Karte */
.fg-anf-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 6px;
}
.fg-anf-header { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.fg-anf-route  { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.fg-anf-msg    { font-size: 12px; color: var(--text); margin-bottom: 8px; }
.fg-anf-actions { display: flex; gap: 8px; }
.fg-anf-accept {
  flex: 1; background: #16a34a; border: none; color: #fff;
  border-radius: 6px; padding: 7px; font-size: 13px; font-weight: 700; cursor: pointer;
}
.fg-anf-reject {
  flex: 1; background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
  color: #ef4444; border-radius: 6px; padding: 7px; font-size: 13px; cursor: pointer;
}
.fg-anf-status-ok     { color: #16a34a; font-size: 12px; font-weight: 700; }
.fg-anf-status-reject { color: #ef4444; font-size: 12px; font-weight: 700; }

/* Modal */
.fg-modal-bg, .fg-anfrage-modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 300;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.fg-modal {
  background: var(--bg2);
  border-radius: 20px 20px 0 0;
  padding: 20px 16px 32px;
  width: 100%;
  max-width: 560px;
  max-height: 92vh;
  overflow-y: auto;
}
.fg-modal-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; }
.fg-form-row { margin-bottom: 12px; }
.fg-form-row label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .3px; }
.fg-input {
  width: 100%;
  background: var(--bg3);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 10px 12px;
  font-size: 15px;
  box-sizing: border-box;
}
.fg-input:focus { border-color: #7c3aed; outline: none; }
.fg-typ-toggle { display: flex; gap: 8px; }
.fg-typ-btn {
  flex: 1;
  background: var(--bg3);
  border: 1.5px solid var(--border);
  color: var(--muted);
  border-radius: 8px;
  padding: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.fg-typ-btn.active { background: rgba(124,58,237,.15); border-color: #7c3aed; color: #7c3aed; }
.fg-modal-actions { display: flex; gap: 10px; margin-top: 16px; }
.fg-modal-cancel { flex: 1; background: var(--bg3); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 12px; font-size: 15px; cursor: pointer; }
.fg-modal-save   { flex: 2; background: #7c3aed; border: none; color: #fff; border-radius: 8px; padding: 12px; font-size: 15px; font-weight: 700; cursor: pointer; }
.fg-anfrage-info { background: rgba(124,58,237,.1); border-radius: 8px; padding: 10px 12px; margin-bottom: 14px; font-size: 13px; }

/* DAP Zugposition */
.dap-position-dot {
  display: inline-block;
  width: 10px; height: 10px;
  background: #ef4444;
  border-radius: 50%;
  box-shadow: 0 0 8px #ef4444;
  animation: pulse 1.5s infinite;
  margin-right: 6px;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: .6; transform: scale(1.3); }
}

/* ═══════════════════════════════════════════════════════
   PROFIL & EINSTELLUNGEN
═══════════════════════════════════════════════════════ */

#view-profil {
  display: flex;
  flex-direction: column;
  height: calc(100vh - var(--status-h) - var(--topbar-h) - var(--nav-h));
  overflow: hidden;
}
.profil-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.profil-back {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 13px;
  cursor: pointer;
}
.profil-title { font-size: 17px; font-weight: 800; }
.profil-body  { flex: 1; overflow-y: auto; padding: 0 0 20px; }

.profil-avatar-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 16px;
  background: linear-gradient(135deg, #CC0000 0%, #991111 100%);
}
.profil-avatar { font-size: 56px; margin-bottom: 8px; }
.profil-avatar-name { font-size: 18px; font-weight: 800; color: #fff; }
.profil-avatar-role { font-size: 13px; color: rgba(255,255,255,.8); margin-top: 2px; }

.profil-section {
  margin: 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
}
.profil-section-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--muted);
  margin-bottom: 12px;
}
.profil-field { margin-bottom: 10px; }
.profil-field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 4px;
  text-transform: uppercase;
}
.profil-input {
  width: 100%;
  background: var(--bg3);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 10px 12px;
  font-size: 15px;
  box-sizing: border-box;
}
.profil-input:focus { border-color: #CC0000; outline: none; }
.profil-textarea { resize: vertical; min-height: 80px; }
.profil-save-btn {
  width: 100%;
  background: #CC0000;
  border: none;
  color: #fff;
  border-radius: 8px;
  padding: 11px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 4px;
}
.profil-hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
.profil-empty { text-align: center; color: var(--muted); padding: 20px; font-size: 13px; }

.profil-fb-card {
  background: var(--bg3);
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 6px;
}
.profil-fb-text { font-size: 13px; }
.profil-fb-date { font-size: 11px; color: var(--muted); margin-top: 4px; }

.profil-section-danger { border-color: rgba(239,68,68,.3); }
.profil-logout-btn {
  width: 100%;
  background: rgba(239,68,68,.1);
  border: 1.5px solid rgba(239,68,68,.3);
  color: #ef4444;
  border-radius: 8px;
  padding: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
}
